services:
  db:
    image: postgres:16-alpine
    container_name: secureframe_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-secureframe_gallery}
      POSTGRES_USER:     ${POSTGRES_USER:-secureframe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secureframe_user -d secureframe_gallery"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: secureframe_minio
    restart: unless-stopped
    ports:
      - "9393:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-change-this-minio-secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
