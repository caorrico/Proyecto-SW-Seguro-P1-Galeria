services:
  db:
    image: postgres:16-alpine
    container_name: secureframe_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       secureframe_db
      POSTGRES_USER:     secureframe
      POSTGRES_PASSWORD: secureframe_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secureframe -d secureframe_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
